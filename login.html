<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PiMS Poll Login</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/ui.css">
<link rel="stylesheet" href="css/animations.css">

<style>

.login-page{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.login-card{
    width:100%;
    max-width:450px;
    background:#111827;
    padding:35px;
    border-radius:20px;
    text-align:center;
}

.login-card h1{
    margin-bottom:10px;
}

.login-card p{
    color:#94a3b8;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:15px;
    text-align:left;
}

.form-group input{
    width:100%;
}

.login-btn{
    width:100%;
    margin-top:10px;
}

.error{
    color:#ef4444;
    margin-top:15px;
    display:none;
}

</style>

</head>
<body>

<div class="login-page">

<div class="login-card fade-up">

<h1>PiMS Poll System</h1>

<p>
Manager Login
</p>

<div class="form-group">
<input
type="email"
id="email"
placeholder="Email Address">
</div>

<div class="form-group">
<input
type="password"
id="password"
placeholder="Password">
</div>

<button
id="loginBtn"
class="btn btn-primary login-btn">

Login

</button>

<div id="error" class="error">
Invalid Email or Password
</div>

</div>

</div>

<script type="module">

import {
initializeApp
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {

getAuth,
signInWithEmailAndPassword

}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyCsuOcZ86B55VnOXQA4Pa3O03n2XQn1_Rk",

authDomain: "pims-poll.firebaseapp.com",

databaseURL: "https://pims-poll-default-rtdb.firebaseio.com",

projectId: "pims-poll",

storageBucket: "pims-poll.firebasestorage.app",

messagingSenderId: "14637440444",

appId: "1:14637440444:web:3444173f31a6c43a809fb9",

measurementId: "G-FP42MFB2WR"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

document
.getElementById("loginBtn")
.addEventListener(
"click",
login
);

async function login(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

if(!email || !password){

alert(
"Please fill all fields"
);

return;

}

try{

await signInWithEmailAndPassword(
auth,
email,
password
);

window.location.href =
"manager/dashboard.html";

}
catch(error){

document
.getElementById("error")
.style.display =
"block";

console.error(error);

}

}

</script>

</body>
</html>
