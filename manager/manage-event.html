<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Manage Events • Digital Club</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="../css/style.css">

<link rel="stylesheet"
href="../css/manager.css">

<link rel="stylesheet"
href="../css/ui.css">

<link rel="stylesheet"
href="../css/animation.css">

<style>

.page{

max-width:1350px;
margin:40px auto;
padding:0 20px;

}

.page-header{

display:flex;
justify-content:space-between;
align-items:center;
gap:20px;
margin-bottom:30px;

}

.search-bar{

margin:25px 0;

}

.search-bar input{

width:100%;

}

.events-grid{

display:grid;

grid-template-columns:
repeat(
auto-fill,
minmax(380px,1fr)
);

gap:22px;

}

.event-card{

background:#111827;

border-radius:18px;

padding:24px;

border:1px solid rgba(255,255,255,.05);

transition:.25s;

}

.event-card:hover{

transform:translateY(-3px);

}

.event-name{

font-size:1.4rem;
font-weight:700;
margin-bottom:12px;

}

.event-meta{

color:#94a3b8;

margin-bottom:6px;

}

.status{

display:inline-block;

margin-top:12px;

padding:6px 14px;

border-radius:999px;

font-size:.85rem;

font-weight:600;

}

.status.active{

background:rgba(22,163,74,.15);

color:#4ade80;

}

.status.inactive{

background:rgba(245,158,11,.15);

color:#fbbf24;

}

.status.closed{

background:rgba(220,38,38,.15);

color:#f87171;

}

.actions{

display:flex;

flex-wrap:wrap;

gap:10px;

margin-top:22px;

}

.actions .btn{

flex:1;

min-width:110px;

}

</style>

</head>

<body class="page-enter">

<div class="page">

<div class="page-header">

<div>

<h1>

Manage Events

</h1>

<p class="text-muted">

Create, edit and manage Digital Club events.

</p>

</div>

<a
href="create-event.html"
class="btn btn-primary">

+ Create Event

</a>

</div>

<div class="search-bar">

<input

type="text"

id="search"

placeholder="Search events..."

autocomplete="off"

>

</div>

<div

id="eventsContainer"

class="events-grid"

>

</div>

</div>

<script type="module">

import {

requireManagerAuth

}

from "../js/firebase.js";

import {

getAllEvents,
deleteEvent

}

from "../js/manager.js";

import {

showToast,
showLoader,
hideLoader,
renderEmptyState,
confirmAction

}

from "../js/ui.js";

requireManagerAuth();

const container =
document.getElementById(
"eventsContainer"
);

const search =
document.getElementById(
"search"
);

let allEvents=[];

async function loadEvents(){

showLoader();

try{

allEvents =
await getAllEvents();

renderEvents(
allEvents
);

}

catch(error){

console.error(error);

showToast(
"Unable to load events.",
"error"
);

}

finally{

hideLoader();

}

}

function renderEvents(events){

container.innerHTML="";

if(events.length===0){

renderEmptyState(
"eventsContainer",
"No Events Found"
);

return;

}

events.forEach(event=>{

const badge=
event.status || "inactive";

container.innerHTML += `

<div class="event-card">

<div class="event-name">

${event.name}

</div>

<div class="event-meta">

Club :
${event.club || "-"}

</div>

<div class="event-meta">

Type :
${event.type || "-"}

</div>

<div class="event-meta">

Start :
${event.startDate || "-"}

</div>

<div class="event-meta">

End :
${event.endDate || "-"}

</div>

<span
class="status ${badge}">

${badge.toUpperCase()}

</span>

<div class="actions">

<button

class="btn btn-primary"

onclick="editEvent('${event.id}')">

Edit

</button>

<button

class="btn btn-success"

onclick="participants('${event.id}')">

Participants

</button>

<button

class="btn btn-warning"

<button
class="btn btn-warning"
onclick="judges('${event.id}')">

Judges

</button>

<button
class="btn btn-outline"
onclick="openVoting('${event.id}')">

Voting

</button>

Voting

</button>

<button

class="btn btn-success"

onclick="results('${event.id}')">

Results

</button>

<button

class="btn btn-danger"

onclick="removeEvent('${event.id}')">

Delete

</button>

</div>

</div>

`;

});

}

window.editEvent=function(id){

location.href=
`create-event.html?id=${id}`;

};

window.participants=function(id){

location.href=
`participants.html?event=${id}`;

};

window.judges=function(id){

location.href=
`judges.html?event=${id}`;

};

window.results=function(id){

location.href=
`results.html?event=${id}`;

};

window.openVoting=function(id){

window.open(

`../vote/vote.html?event=${id}`,

"_blank"

);

};

window.removeEvent=

async function(id){

const ok=

confirmAction(

"Delete this event permanently?"

);

if(!ok){

return;

}

showLoader();

try{

await deleteEvent(id);

showToast(

"Event deleted successfully."

);

allEvents=

allEvents.filter(

event=>event.id!==id

);

renderEvents(

allEvents

);

}

catch(error){

console.error(error);

showToast(

"Unable to delete event.",

"error"

);

}

finally{

hideLoader();

}

};

search.addEventListener(

"input",

e=>{

const term=

e.target.value

.toLowerCase()

.trim();

if(!term){

renderEvents(

allEvents

);

return;

}

const filtered=

allEvents.filter(

event=>

(event.name||"")

.toLowerCase()

.includes(term)

||

(event.club||"")

.toLowerCase()

.includes(term)

||

(event.type||"")

.toLowerCase()

.includes(term)

);

renderEvents(

filtered

);

}

);

loadEvents();

</script>

</body>

</html>
