<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Create Event</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="../css/style.css">

<link rel="stylesheet"
href="../css/manager.css">

<link rel="stylesheet"
href="../css/ui.css">

<link rel="stylesheet"
href="../css/animation.css">

<style>

.page{

max-width:900px;
margin:40px auto;

padding:0 20px;

}

.page-header{

display:flex;

justify-content:space-between;
align-items:center;

margin-bottom:30px;

gap:20px;

}

.page-header h1{

margin:0;

}

.back-link{

display:inline-flex;

align-items:center;

gap:8px;

text-decoration:none;

color:white;

font-weight:600;

}

.form-card{

background:#111827;

border-radius:18px;

padding:30px;

border:1px solid rgba(255,255,255,.05);

}

.form-grid{

display:grid;

grid-template-columns:
repeat(
2,
minmax(0,1fr)
);

gap:20px;

}

.full{

grid-column:1/-1;

}

.actions{

display:flex;

justify-content:flex-end;

gap:15px;

margin-top:30px;

flex-wrap:wrap;

}

.required{

color:#ef4444;

margin-left:4px;

}

small{

display:block;

margin-top:8px;

color:#94a3b8;

}

@media(max-width:768px){

.form-grid{

grid-template-columns:1fr;

}

.actions{

flex-direction:column;

}

.actions .btn{

width:100%;

}

.page-header{

flex-direction:column;

align-items:flex-start;

}

}

</style>

</head>

<body class="page-enter">

<div class="page">

<div class="page-header">

<div>

<h1 id="pageTitle">

Create Event

</h1>

<p class="text-muted">

Create or edit a Digital Club event.

</p>

</div>

<a
href="manage-event.html"
class="back-link">

← Back to Events

</a>

</div>

<div class="form-card">

<form id="eventForm">

<div class="form-grid">

<div class="form-group">

<label>

Event Name

<span class="required">

*

</span>

</label>

<input

type="text"

id="eventName"

maxlength="120"

placeholder="Know Your Faculty"

required

>

</div>

<div class="form-group">

<label>

Organizing Club

<span class="required">

*

</span>

</label>

<input

type="text"

id="club"

maxlength="100"

placeholder="Digital Club"

required

>

</div>

<div class="form-group">

<label>

Event Type

<span class="required">

*

</span>

</label>

<select
id="type">

<option
value="Audience Voting">

Audience Voting

</option>

<option
value="Judge Scoring">

Judge Scoring

</option>

<option
value="Hybrid">

Hybrid

</option>

</select>

</div>

<div class="form-group">

<label>

Status

</label>

<select
id="status">

<option
value="active">

Active

</option>

<option
value="inactive">

Inactive

</option>

<option
value="closed">

Closed

</option>

</select>

</div>

<div class="form-group">

<label>

Start Date

<span class="required">

*

</span>

</label>

<input

type="date"

id="startDate"

required

>

</div>

<div class="form-group">

<label>

End Date

<span class="required">

*

</span>

</label>

<input

type="date"

id="endDate"

required

>

</div>

<div class="form-group full">

<label>

Rules / Description

</label>

<textarea

id="rules"

rows="7"

maxlength="5000"

placeholder="Enter rules, judging criteria, eligibility, important instructions..."

></textarea>

<small>

This description will be shown on the voting page.

</small>

</div>

</div>

<div class="actions">

<button

type="button"

class="btn btn-outline"

onclick="window.location.href='manage-event.html'">

Cancel

</button>

<button

type="submit"

id="saveButton"

class="btn btn-primary">

Save Event

</button>

</div>

</form>

</div>

</div>

<script type="module">

    import {

requireManagerAuth

}

from "../js/firebase.js";

import {

getEvent,
createEvent,
updateEvent

}

from "../js/manager.js";

import {

showToast,
showLoader,
hideLoader

}

from "../js/ui.js";

requireManagerAuth();

const params =
new URLSearchParams(
window.location.search
);

const eventId =
params.get("id");

const form =
document.getElementById(
"eventForm"
);

const pageTitle =
document.getElementById(
"pageTitle"
);

const saveButton =
document.getElementById(
"saveButton"
);

async function loadEvent(){

if(!eventId){

return;

}

showLoader();

try{

pageTitle.innerText =
"Edit Event";

saveButton.innerText =
"Update Event";

const event =
await getEvent(eventId);

if(!event){

showToast(
"Event not found",
"error"
);

setTimeout(()=>{

window.location.href =
"manage-event.html";

},1000);

return;

}

document.getElementById(
"eventName"
).value =
event.name || "";

document.getElementById(
"club"
).value =
event.club || "";

document.getElementById(
"type"
).value =
event.type || "Audience Voting";

document.getElementById(
"status"
).value =
event.status || "active";

document.getElementById(
"startDate"
).value =
event.startDate || "";

document.getElementById(
"endDate"
).value =
event.endDate || "";

document.getElementById(
"rules"
).value =
event.rules || "";

}

catch(error){

console.error(error);

showToast(
"Unable to load event.",
"error"
);

}

finally{

hideLoader();

}

}

form.addEventListener(
"submit",
async(e)=>{

e.preventDefault();

const name =
document.getElementById(
"eventName"
).value.trim();

const club =
document.getElementById(
"club"
).value.trim();

const type =
document.getElementById(
"type"
).value;

const status =
document.getElementById(
"status"
).value;

const startDate =
document.getElementById(
"startDate"
).value;

const endDate =
document.getElementById(
"endDate"
).value;

const rules =
document.getElementById(
"rules"
).value.trim();

if(

!name ||

!club ||

!startDate ||

!endDate

){

showToast(

"Please fill all required fields.",

"warning"

);

return;

}

if(

new Date(endDate)

<

new Date(startDate)

){

showToast(

"End date cannot be before start date.",

"warning"

);

return;

}

const eventData={

name,

club,

type,

status,

startDate,

endDate,

rules

};

showLoader();

saveButton.disabled=true;

try{

if(eventId){

await updateEvent(

eventId,

eventData

);

showToast(

"Event updated successfully."

);

}

else{

await createEvent(

eventData

);

showToast(

"Event created successfully."

);

}

setTimeout(()=>{

window.location.href=

"manage-event.html";

},1000);

}

catch(error){

console.error(error);

showToast(

"Failed to save event.",

"error"

);

}

finally{

hideLoader();

saveButton.disabled=false;

}

});

loadEvent();

</script>

</body>

</html>
