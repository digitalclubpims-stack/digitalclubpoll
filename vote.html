<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vote • Digital Club</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{

--bg:#020617;
--card:#111827;
--card2:#1e293b;
--primary:#2563eb;
--success:#16a34a;
--danger:#dc2626;
--text:#ffffff;
--muted:#94a3b8;
--border:rgba(255,255,255,.08);

}

*{

margin:0;
padding:0;
box-sizing:border-box;

}

body{

font-family:"Inter",sans-serif;

background:
linear-gradient(135deg,#020617,#0f172a);

color:var(--text);

min-height:100vh;

}

.container{

max-width:1100px;

margin:auto;

padding:40px 20px;

}

.header{

text-align:center;

margin-bottom:35px;

}

.header h1{

font-family:"Syne",sans-serif;

font-size:2.5rem;

font-weight:800;

margin-bottom:12px;

}

.header p{

color:var(--muted);

font-size:1rem;

}

.event-card{

background:rgba(255,255,255,.05);

backdrop-filter:blur(18px);

border:1px solid var(--border);

border-radius:20px;

padding:25px;

margin-bottom:30px;

}

.event-grid{

display:grid;

grid-template-columns:

repeat(auto-fit,minmax(220px,1fr));

gap:20px;

}

.info-title{

font-size:.85rem;

color:var(--muted);

margin-bottom:6px;

}

.info-value{

font-size:1.05rem;

font-weight:600;

}

.form-card{

background:rgba(255,255,255,.05);

backdrop-filter:blur(18px);

border:1px solid var(--border);

border-radius:20px;

padding:25px;

margin-bottom:35px;

}

.form-card h2{

margin-bottom:18px;

font-size:1.35rem;

}

.form-grid{

display:grid;

grid-template-columns:

repeat(auto-fit,minmax(250px,1fr));

gap:18px;

}

input{

width:100%;

padding:14px 16px;

border:none;

outline:none;

border-radius:12px;

font-size:15px;

background:white;

color:#111827;

}

input:focus{

box-shadow:

0 0 0 3px

rgba(37,99,235,.35);

}

.section-title{

font-family:"Syne",sans-serif;

font-size:1.8rem;

margin-bottom:25px;

}

#participants{

display:grid;

grid-template-columns:

repeat(auto-fill,minmax(320px,1fr));

gap:20px;

}

.participant{

background:rgba(255,255,255,.05);

border:1px solid var(--border);

border-radius:18px;

padding:22px;

transition:.25s;

}

.participant:hover{

transform:translateY(-3px);

}

.participant-name{

font-size:1.25rem;

font-weight:700;

margin-bottom:10px;

}

.participant-category{

color:var(--muted);

margin-bottom:18px;

}

.vote-btn{

width:100%;

padding:13px;

border:none;

border-radius:12px;

cursor:pointer;

background:var(--primary);

color:white;

font-size:15px;

font-weight:600;

transition:.25s;

}

.vote-btn:hover{

opacity:.9;

transform:translateY(-1px);

}

.vote-btn:disabled{

opacity:.5;

cursor:not-allowed;

}

.loader{

display:flex;

justify-content:center;

align-items:center;

padding:60px;

font-size:18px;

color:var(--muted);

}

.message{

margin-top:25px;

padding:16px;

border-radius:12px;

display:none;

font-weight:500;

}

.success{

background:rgba(22,163,74,.15);

color:#4ade80;

}

.error{

background:rgba(220,38,38,.15);

color:#f87171;

}

.empty{

text-align:center;

padding:60px;

color:var(--muted);

font-size:18px;

}

@media(max-width:700px){

.header h1{

font-size:2rem;

}

.container{

padding:20px 15px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1 id="eventTitle">

Loading Event...

</h1>

<p>

Select one participant and submit your vote

</p>

</div>

<div class="event-card">

<div class="event-grid">

<div>

<div class="info-title">

Club

</div>

<div
id="club"
class="info-value">

-

</div>

</div>

<div>

<div class="info-title">

Type

</div>

<div
id="type"
class="info-value">

-

</div>

</div>

<div>

<div class="info-title">

Start Date

</div>

<div
id="start"
class="info-value">

-

</div>

</div>

<div>

<div class="info-title">

End Date

</div>

<div
id="end"
class="info-value">

-

</div>

</div>

</div>

</div>

<div class="form-card">

<h2>

Voter Details

</h2>

<div class="form-grid">

<input
type="text"
id="name"
placeholder="Your Name">

<input
type="text"
id="batch"
placeholder="Batch">

<input
type="text"
id="roll"
placeholder="Roll Number">

</div>

<div
id="message"
class="message">

</div>

</div>

<h2 class="section-title">

Participants

</h2>

<div
id="participants">

<div class="loader">

Loading Participants...

</div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {

getFirestore,
collection,
doc,
getDoc,
getDocs,
query,
where,
addDoc

}

from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyCsuOcZ86B55VnOXQA4Pa3O03n2XQn1_Rk",

authDomain: "pims-poll.firebaseapp.com",

databaseURL: "https://pims-poll-default-rtdb.firebaseio.com",

projectId: "pims-poll",

storageBucket: "pims-poll.firebasestorage.app",

messagingSenderId: "14637440444",

appId: "1:14637440444:web:3444173f31a6c43a809fb9",

measurementId: "G-FP42MFB2WR"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);

const eventId = params.get("event");

const eventTitle = document.getElementById("eventTitle");

const participantsDiv = document.getElementById("participants");

const message = document.getElementById("message");

    function showMessage(text, type = "success") {

message.style.display = "block";

message.className = "message " + type;

message.textContent = text;

}

function hideMessage() {

message.style.display = "none";

}

async function loadEvent() {

try {

if (!eventId) {

eventTitle.textContent = "Invalid Event";

participantsDiv.innerHTML = `
<div class="empty">
Invalid Event ID.
</div>
`;

return;

}

const eventRef = doc(db, "events", eventId);

const eventSnap = await getDoc(eventRef);

if (!eventSnap.exists()) {

eventTitle.textContent = "Event Not Found";

participantsDiv.innerHTML = `
<div class="empty">
This event does not exist.
</div>
`;

return;

}

const event = eventSnap.data();

eventTitle.textContent = event.name || "Unnamed Event";

document.getElementById("club").textContent =
event.club || "-";

document.getElementById("type").textContent =
event.type || "-";

document.getElementById("start").textContent =
event.startDate || "-";

document.getElementById("end").textContent =
event.endDate || "-";

await loadParticipants();

}

catch(error){

console.error(error);

eventTitle.textContent = "Unable to Load Event";

participantsDiv.innerHTML = `
<div class="empty">
Failed to load event.
</div>
`;

}

}

async function loadParticipants(){

participantsDiv.innerHTML = `
<div class="loader">
Loading Participants...
</div>
`;

try{

const q = query(

collection(db,"participants"),

where("eventId","==",eventId)

);

const snapshot = await getDocs(q);

participantsDiv.innerHTML = "";

if(snapshot.empty){

participantsDiv.innerHTML = `
<div class="empty">
No participants have been added for this event.
</div>
`;

return;

}

snapshot.forEach(docSnap=>{

const p = docSnap.data();

participantsDiv.innerHTML += `

<div class="participant">

<div class="participant-name">

${p.name}

</div>

<div class="participant-category">

${p.category || "Participant"}

</div>

<button
class="vote-btn"
onclick="submitVote(
'${docSnap.id}',
'${p.name.replace(/'/g,"\\'")}'
)">

Vote

</button>

</div>

`;

});

}

catch(error){

console.error(error);

participantsDiv.innerHTML = `
<div class="empty">
Unable to load participants.
</div>
`;

}

}

window.submitVote = async function (
participantId,
participantName
){

hideMessage();

const voterName =
document
.getElementById("name")
.value
.trim();

const batch =
document
.getElementById("batch")
.value
.trim();

const roll =
document
.getElementById("roll")
.value
.trim();

if(
!voterName ||
!batch ||
!roll
){

showMessage(
"Please fill all voter details.",
"error"
);

return;

}

try{

const duplicateQuery =
query(

collection(db,"votes"),

where(
"eventId",
"==",
eventId
),

where(
"roll",
"==",
roll
)

);

const duplicateSnapshot =
await getDocs(
duplicateQuery
);

if(
!duplicateSnapshot.empty
){

showMessage(
"You have already voted.",
"error"
);

return;

}

await addDoc(

collection(db,"votes"),

{

eventId,

participantId,

participantName,

voterName,

batch,

roll,

timestamp:Date.now()

}

);

showMessage(
"Vote submitted successfully!",
"success"
);

document
.getElementById("name")
.value="";

document
.getElementById("batch")
.value="";

document
.getElementById("roll")
.value="";

const buttons =
document.querySelectorAll(
".vote-btn"
);

buttons.forEach(btn=>{

btn.disabled=true;

btn.textContent=
"Vote Submitted";

});

setTimeout(()=>{

window.location.href=
"events.html";

},2000);

}

catch(error){

console.error(error);

showMessage(
"Failed to submit vote. Please try again.",
"error"
);

}

};

loadEvent();

</script>

</body>

</html>
