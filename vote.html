<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vote • Digital Club</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{

--bg:#020617;
--card:#111827;
--primary:#2563eb;
--success:#16a34a;
--danger:#dc2626;
--text:#fff;
--muted:#94a3b8;
--border:rgba(255,255,255,.08);

}

*{

margin:0;
padding:0;
box-sizing:border-box;

}

body{

font-family:"Inter",sans-serif;
background:linear-gradient(135deg,#020617,#0f172a);
color:var(--text);
min-height:100vh;

}

.container{

max-width:1100px;
margin:auto;
padding:40px 20px;

}

.header{

text-align:center;
margin-bottom:35px;

}

.header h1{

font-family:"Syne",sans-serif;
font-size:2.5rem;
margin-bottom:10px;

}

.header p{

color:var(--muted);

}

.event-card,
.form-card{

background:rgba(255,255,255,.05);
border:1px solid var(--border);
backdrop-filter:blur(18px);
border-radius:20px;
padding:25px;
margin-bottom:30px;

}

.event-grid,
.form-grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;

}

.info-title{

color:var(--muted);
font-size:.9rem;
margin-bottom:6px;

}

.info-value{

font-weight:600;

}

input{

width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:15px;

}

.section-title{

font-family:"Syne",sans-serif;
margin-bottom:25px;

}

#participants{

display:grid;
grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
gap:20px;

}

.participant{

background:rgba(255,255,255,.05);
border:1px solid var(--border);
border-radius:18px;
padding:22px;

}

.participant-name{

font-size:1.2rem;
font-weight:700;
margin-bottom:8px;

}

.participant-category{

color:var(--muted);
margin-bottom:18px;

}

.vote-btn{

width:100%;
padding:13px;
border:none;
border-radius:10px;
background:var(--primary);
color:#fff;
cursor:pointer;
font-weight:600;

}

.vote-btn:disabled{

background:var(--success);
cursor:not-allowed;

}

.loader,
.empty{

text-align:center;
padding:60px;
color:var(--muted);

}

.message{

display:none;
margin-top:20px;
padding:15px;
border-radius:10px;

}

.success{

background:#14532d;
color:#86efac;

}

.error{

background:#7f1d1d;
color:#fecaca;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1 id="eventTitle">

Loading Event...

</h1>

<p>

Vote for your favourite participant

</p>

</div>

<div class="event-card">

<div class="event-grid">

<div>

<div class="info-title">

Club

</div>

<div id="club" class="info-value">

-

</div>

</div>

<div>

<div class="info-title">

Type

</div>

<div id="type" class="info-value">

-

</div>

</div>

<div>

<div class="info-title">

Start Date

</div>

<div id="start" class="info-value">

-

</div>

</div>

<div>

<div class="info-title">

End Date

</div>

<div id="end" class="info-value">

-

</div>

</div>

</div>

</div>

<div class="form-card">

<h2>

Voter Details

</h2>

<div class="form-grid">

<input type="text" id="name" placeholder="Your Name">

<input type="text" id="batch" placeholder="Batch">

<input type="text" id="roll" placeholder="Roll Number">

</div>

<div id="message" class="message"></div>

</div>

<h2 class="section-title">

Participants

</h2>

<div id="participants">

<div class="loader">

Loading Participants...

</div>

</div>

</div>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {

getFirestore,
collection,
doc,
getDoc,
getDocs,
query,
where,
addDoc,
serverTimestamp

}

from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig={

apiKey:"AIzaSyCsuOcZ86B55VnOXQA4Pa3O03n2XQn1_Rk",

authDomain:"pims-poll.firebaseapp.com",

databaseURL:"https://pims-poll-default-rtdb.firebaseio.com",

projectId:"pims-poll",

storageBucket:"pims-poll.firebasestorage.app",

messagingSenderId:"14637440444",

appId:"1:14637440444:web:3444173f31a6c43a809fb9",

measurementId:"G-FP42MFB2WR"

};

const app=initializeApp(firebaseConfig);

const db=getFirestore(app);

const params=new URLSearchParams(window.location.search);

const eventId=params.get("event");

const participantsDiv=document.getElementById("participants");

const eventTitle=document.getElementById("eventTitle");

const message=document.getElementById("message");

function showMessage(text,type="success"){

message.style.display="block";

message.className="message "+type;

message.textContent=text;

}

function hideMessage(){

message.style.display="none";

}

async function loadEvent(){

try{

if(!eventId){

eventTitle.innerText="Invalid Event";

participantsDiv.innerHTML=`

<div class="empty">

Invalid Event ID

</div>

`;

return;

}

const eventSnap=

await getDoc(

doc(db,"events",eventId)

);

if(!eventSnap.exists()){

eventTitle.innerText="Event Not Found";

participantsDiv.innerHTML=`

<div class="empty">

Event does not exist.

</div>

`;

return;

}

const event=eventSnap.data();

if(event.status!=="active"){

eventTitle.innerText=event.name;

participantsDiv.innerHTML=`

<div class="empty">

Voting is currently closed.

</div>

`;

return;

}

eventTitle.innerText=event.name;

document.getElementById("club").innerText=event.club||"-";

document.getElementById("type").innerText=event.type||"-";

document.getElementById("start").innerText=event.startDate||"-";

document.getElementById("end").innerText=event.endDate||"-";

loadParticipants();

}

catch(error){

console.error(error);

participantsDiv.innerHTML=`

<div class="empty">

Unable to load event.

</div>

`;

}

}

async function loadParticipants(){

participantsDiv.innerHTML=`

<div class="loader">

Loading Participants...

</div>

`;

const snapshot=

await getDocs(

query(

collection(db,"participants"),

where("eventId","==",eventId)

)

);

participantsDiv.innerHTML="";

if(snapshot.empty){

participantsDiv.innerHTML=`

<div class="empty">

No Participants Found

</div>

`;

return;

}

snapshot.forEach(docSnap=>{

const p=docSnap.data();

participantsDiv.innerHTML+=`

<div class="participant">

<div class="participant-name">

${p.participantNumber || "-"}

</div>

<div class="participant-category">

${p.name}

<br>

${p.category || ""}

</div>

<button

class="vote-btn"

onclick="submitVote('${docSnap.id}','${(p.name||"").replace(/'/g,"\\'")}')">

Vote

</button>

</div>

`;

});

}

window.submitVote=async function(

participantId,
participantName

){

hideMessage();

const voterName=

document.getElementById("name")
.value.trim();

const batch=

document.getElementById("batch")
.value.trim();

const roll=

document.getElementById("roll")
.value.trim();

if(

!voterName||
!batch||
!roll

){

showMessage(

"Please fill all voter details.",

"error"

);

return;

}

try{

const duplicate=

await getDocs(

query(

collection(db,"votes"),

where("eventId","==",eventId),

where("roll","==",roll)

)

);

if(!duplicate.empty){

showMessage(

"You have already voted.",

"error"

);

return;

}

await addDoc(

collection(db,"votes"),

{

eventId,

participantId,

participantName,

voterName,

batch,

roll,

createdAt:serverTimestamp()

}

);

showMessage(

"Vote submitted successfully!",

"success"

);

document.getElementById("name").value="";

document.getElementById("batch").value="";

document.getElementById("roll").value="";

document.querySelectorAll(".vote-btn")

.forEach(btn=>{

btn.disabled=true;

btn.innerText="Vote Submitted";

});

setTimeout(()=>{

window.location.href="events.html";

},1500);

}

catch(error){

console.error(error);

showMessage(

error.message,

"error"

);

}

};

loadEvent();

</script>

</body>

</html>
