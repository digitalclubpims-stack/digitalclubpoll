<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Event Results</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="../css/style.css">

<link rel="stylesheet"
href="../css/manager.css">

<link rel="stylesheet"
href="../css/ui.css">

<link rel="stylesheet"
href="../css/animation.css">

<style>

.page{

max-width:1400px;

margin:auto;

padding:40px 20px;

}

.page-header{

display:flex;

justify-content:space-between;

align-items:center;

gap:20px;

margin-bottom:35px;

flex-wrap:wrap;

}

.page-title h1{

margin-bottom:8px;

}

.page-title p{

color:#94a3b8;

}

.header-actions{

display:flex;

gap:12px;

flex-wrap:wrap;

}

.summary-grid{

display:grid;

grid-template-columns:

repeat(
auto-fit,
minmax(220px,1fr)
);

gap:20px;

margin-bottom:35px;

}

.summary-card{

background:#111827;

border-radius:18px;

padding:24px;

border:1px solid rgba(255,255,255,.06);

}

.summary-label{

color:#94a3b8;

margin-bottom:10px;

font-size:.95rem;

}

.summary-value{

font-size:2rem;

font-weight:700;

font-family:"Syne",sans-serif;

}

.podium{

display:grid;

grid-template-columns:

repeat(
3,
1fr
);

gap:20px;

margin-bottom:35px;

}

.winner-card{

background:#111827;

border-radius:20px;

padding:28px;

text-align:center;

border:1px solid rgba(255,255,255,.08);

}

.winner-rank{

font-size:3rem;

margin-bottom:12px;

}

.winner-title{

font-size:1.4rem;

font-family:"Syne",sans-serif;

margin-bottom:10px;

}

.winner-name{

font-size:1.15rem;

font-weight:700;

margin-bottom:10px;

}

.winner-score{

font-size:2rem;

font-weight:700;

color:#60a5fa;

}

.gold{

border-color:#fbbf24;

}

.silver{

border-color:#d1d5db;

}

.bronze{

border-color:#fb923c;

}

.results-card{

background:#111827;

border-radius:20px;

padding:25px;

border:1px solid rgba(255,255,255,.06);

}

.results-header{

display:flex;

justify-content:space-between;

align-items:center;

gap:20px;

margin-bottom:20px;

flex-wrap:wrap;

}

.search-box{

max-width:320px;

width:100%;

}

.table-wrapper{

overflow-x:auto;

}

.results-table{

width:100%;

border-collapse:collapse;

}

.results-table th{

padding:15px;

text-align:left;

color:#94a3b8;

border-bottom:1px solid rgba(255,255,255,.08);

}

.results-table td{

padding:15px;

border-bottom:1px solid rgba(255,255,255,.06);

}

.rank-badge{

display:inline-flex;

align-items:center;

justify-content:center;

width:36px;

height:36px;

border-radius:50%;

font-weight:700;

background:#1f2937;

}

.rank-1{

background:#fbbf24;

color:#111827;

}

.rank-2{

background:#d1d5db;

color:#111827;

}

.rank-3{

background:#fb923c;

color:#111827;

}

.score{

font-weight:700;

color:#60a5fa;

}

.empty{

padding:70px 20px;

text-align:center;

color:#94a3b8;

}

@media(max-width:900px){

.podium{

grid-template-columns:1fr;

}

.page-header{

flex-direction:column;

align-items:flex-start;

}

}

</style>

</head>

<body class="page-enter">

<div class="page">

<div class="page-header">

<div class="page-title">

<h1 id="eventTitle">

Loading Results...

</h1>

<p id="eventSubtitle">

Loading event information...

</p>

</div>

<div class="header-actions">

<a
href="manage-event.html"
class="btn btn-outline">

Back

</a>

<button
class="btn btn-primary"
id="refreshBtn">

Refresh

</button>

<button
class="btn btn-success"
id="exportBtn">

Export CSV

</button>

</div>

</div>

<div class="summary-grid">

<div class="summary-card">

<div class="summary-label">

Total Participants

</div>

<div
class="summary-value"
id="participantCount">

0

</div>

</div>

<div class="summary-card">

<div class="summary-label">

Total Votes

</div>

<div
class="summary-value"
id="voteCount">

0

</div>

</div>

<div class="summary-card">

<div class="summary-label">

Leading Participant

</div>

<div
class="summary-value"
id="leaderName">

-

</div>

</div>

<div class="summary-card">

<div class="summary-label">

Winning Votes

</div>

<div
class="summary-value"
id="leaderVotes">

0

</div>

</div>

</div>

  <div class="podium">

<div class="winner-card silver">

<div class="winner-rank">

🥈

</div>

<div class="winner-title">

Runner-up

</div>

<div
class="winner-name"
id="secondName">

-

</div>

<div
class="winner-score"
id="secondVotes">

0

</div>

</div>

<div class="winner-card gold">

<div class="winner-rank">

🥇

</div>

<div class="winner-title">

Winner

</div>

<div
class="winner-name"
id="firstName">

-

</div>

<div
class="winner-score"
id="firstVotes">

0

</div>

</div>

<div class="winner-card bronze">

<div class="winner-rank">

🥉

</div>

<div class="winner-title">

Second Runner-up

</div>

<div
class="winner-name"
id="thirdName">

-

</div>

<div
class="winner-score"
id="thirdVotes">

0

</div>

</div>

</div>

<div class="results-card">

<div class="results-header">

<h2>

Leaderboard

</h2>

<input

type="text"

id="search"

class="search-input search-box"

placeholder="Search participant..."

>

</div>

<div class="table-wrapper">

<table class="results-table">

<thead>

<tr>

<th>

Rank

</th>

<th>

Participant No.

</th>

<th>

Participant Name

</th>

<th>

Category

</th>

<th>

Votes

</th>

</tr>

</thead>

<tbody id="resultsBody">

<tr>

<td
colspan="5"
class="empty">

Loading Results...

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

<script type="module">

import {

requireManagerAuth

}

from "../js/firebase.js";

import {

getEvent,
getLeaderboard

}

from "../js/manager.js";

import {

showLoader,
hideLoader,
showToast,
getParam

}

from "../js/ui.js";

requireManagerAuth();

const eventId =
getParam("event");

const tbody =
document.getElementById(
"resultsBody"
);

let leaderboard = [];

document
.getElementById(
"refreshBtn"
)
.addEventListener(
"click",
loadResults
);

document
.getElementById(
"search"
)
.addEventListener(
"input",
filterResults
);

  async function loadResults(){

if(!eventId){

showToast(
"Event ID missing.",
"error"
);

return;

}

showLoader();

try{

const event =
await getEvent(eventId);

if(!event){

showToast(
"Event not found.",
"error"
);

hideLoader();

return;

}

document.getElementById(
"eventTitle"
).innerText =
event.name;

document.getElementById(
"eventSubtitle"
).innerText =

`${event.club} • ${event.type}`;

leaderboard =
await getLeaderboard(eventId);

renderLeaderboard(
leaderboard
);

}
catch(error){

console.error(error);

showToast(
"Unable to load results.",
"error"
);

}
finally{

hideLoader();

}

}



function renderLeaderboard(list){

tbody.innerHTML = "";

if(list.length===0){

tbody.innerHTML =

`<tr>

<td colspan="5" class="empty">

No Participants Found

</td>

</tr>`;

resetPodium();

return;

}

let totalVotes = 0;

list.forEach(item=>{

totalVotes +=
item.votes || 0;

tbody.innerHTML +=

`

<tr>

<td>

<span class="rank-badge rank-${item.rank}">

${item.rank}

</span>

</td>

<td>

${item.participantNumber || "-"}

</td>

<td>

${item.name}

</td>

<td>

${item.category || "-"}

</td>

<td class="score">

${item.votes}

</td>

</tr>

`;

});

document.getElementById(
"participantCount"
).innerText =
list.length;

document.getElementById(
"voteCount"
).innerText =
totalVotes;

updatePodium(list);

}



function updatePodium(list){

const first =
list[0];

const second =
list[1];

const third =
list[2];

document.getElementById(
"leaderName"
).innerText =
first?.name || "-";

document.getElementById(
"leaderVotes"
).innerText =
first?.votes || 0;

document.getElementById(
"firstName"
).innerText =
first?.name || "-";

document.getElementById(
"firstVotes"
).innerText =
first?.votes || 0;

document.getElementById(
"secondName"
).innerText =
second?.name || "-";

document.getElementById(
"secondVotes"
).innerText =
second?.votes || 0;

document.getElementById(
"thirdName"
).innerText =
third?.name || "-";

document.getElementById(
"thirdVotes"
).innerText =
third?.votes || 0;

}



function resetPodium(){

document.getElementById(
"leaderName"
).innerText="-";

document.getElementById(
"leaderVotes"
).innerText="0";

document.getElementById(
"firstName"
).innerText="-";

document.getElementById(
"firstVotes"
).innerText="0";

document.getElementById(
"secondName"
).innerText="-";

document.getElementById(
"secondVotes"
).innerText="0";

document.getElementById(
"thirdName"
).innerText="-";

document.getElementById(
"thirdVotes"
).innerText="0";

}



function filterResults(e){

const term =
e.target.value
.toLowerCase();

const filtered =
leaderboard.filter(item=>

(item.name || "")
.toLowerCase()
.includes(term)

||

(item.participantNumber || "")
.toLowerCase()
.includes(term)

||

(item.category || "")
.toLowerCase()
.includes(term)

);

renderLeaderboard(filtered);

}



document
.getElementById(
"exportBtn"
)
.addEventListener(
"click",
()=>{

if(
leaderboard.length===0
){

showToast(
"No data to export.",
"warning"
);

return;

}

let csv =

"Rank,Participant Number,Participant Name,Category,Votes\n";

leaderboard.forEach(item=>{

csv +=

`${item.rank},${item.participantNumber || ""},"${item.name}",${item.category || ""},${item.votes}\n`;

});

const blob =
new Blob(
[csv],
{
type:"text/csv"
}
);

const url =
URL.createObjectURL(blob);

const a =
document.createElement("a");

a.href = url;

a.download =

"results.csv";

a.click();

URL.revokeObjectURL(url);

showToast(
"CSV Exported"
);

}

);

loadResults();

</script>

</body>

</html>
