<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Judge Portal • Digital Club</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="../css/style.css">

<link rel="stylesheet"
href="../css/ui.css">

<style>

*{

margin:0;
padding:0;
box-sizing:border-box;

}

body{

background:#020617;
color:#fff;
font-family:"Inter",sans-serif;

}

.container{

max-width:1200px;
margin:auto;
padding:40px 20px;

}

.header{

background:#111827;
padding:28px;
border-radius:20px;
margin-bottom:30px;

}

.header h1{

font-family:"Syne",sans-serif;
font-size:2rem;
margin-bottom:8px;

}

.header p{

color:#94a3b8;

}

.stats{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:20px;

margin-top:25px;

}

.stat{

background:#1f2937;

padding:18px;

border-radius:14px;

}

.stat-title{

color:#94a3b8;
font-size:.9rem;
margin-bottom:8px;

}

.stat-value{

font-size:1.3rem;
font-weight:700;

}

.participants{

display:grid;

grid-template-columns:
repeat(auto-fill,minmax(340px,1fr));

gap:20px;

}

.card{

background:#111827;

border-radius:18px;

padding:22px;

display:flex;

justify-content:space-between;

align-items:center;

transition:.25s;

}

.card:hover{

transform:translateY(-3px);

}

.info h3{

margin-bottom:8px;

font-size:1.25rem;

}

.info p{

color:#94a3b8;

margin-bottom:4px;

}

.score-btn{

background:#2563eb;

color:#fff;

border:none;

padding:12px 20px;

border-radius:10px;

cursor:pointer;

font-weight:600;

}

.score-btn:hover{

opacity:.9;

}

.score-btn:disabled{

background:#16a34a;

cursor:not-allowed;

}

.empty{

text-align:center;

padding:60px;

color:#94a3b8;

font-size:18px;

}

.loader{

text-align:center;

padding:60px;

font-size:18px;

color:#94a3b8;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1 id="eventName">

Loading...

</h1>

<p id="judgeInfo">

Loading Judge...

</p>

<div class="stats">

<div class="stat">

<div class="stat-title">

Participants

</div>

<div
id="participantCount"
class="stat-value">

0

</div>

</div>

<div class="stat">

<div class="stat-title">

Scored

</div>

<div
id="scoredCount"
class="stat-value">

0

</div>

</div>

</div>

</div>

<div
id="participantsList"
class="participants">

<div class="loader">

Loading Participants...

</div>

</div>

</div>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {

getFirestore,
collection,
query,
where,
getDocs,
doc,
getDoc

}

from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig={

apiKey:"AIzaSyCsuOcZ86B55VnOXQA4Pa3O03n2XQn1_Rk",

authDomain:"pims-poll.firebaseapp.com",

databaseURL:"https://pims-poll-default-rtdb.firebaseio.com",

projectId:"pims-poll",

storageBucket:"pims-poll.firebasestorage.app",

messagingSenderId:"14637440444",

appId:"1:14637440444:web:3444173f31a6c43a809fb9",

measurementId:"G-FP42MFB2WR"

};

const app=initializeApp(firebaseConfig);

const db=getFirestore(app);

const params=new URLSearchParams(window.location.search);

const judgeId=params.get("judge");

let judge=null;
let scored=0;

async function loadJudge(){

if(!judgeId){

alert("Judge ID Missing");

window.location.href="../login.html";

return;

}

const q=

query(

collection(db,"judges"),

where("judgeId","==",judgeId)

);

const snapshot=

await getDocs(q);

if(snapshot.empty){

alert("Invalid Judge ID");

window.location.href="../login.html";

return;

}

judge=snapshot.docs[0].data();

document.getElementById("judgeInfo")
.innerText=

`${judge.name} • ${judge.judgeId}`;

const eventSnap=

await getDoc(

doc(db,"events",judge.eventId)

);

if(eventSnap.exists()){

document.getElementById("eventName")
.innerText=

eventSnap.data().name;

}

loadParticipants();

}

async function loadParticipants(){

const participantQuery=

query(

collection(db,"participants"),

where("eventId","==",judge.eventId)

);

const participantSnapshot=

await getDocs(participantQuery);

const scoreQuery=

query(

collection(db,"scores"),

where("judgeId","==",judgeId)

);

const scoreSnapshot=

await getDocs(scoreQuery);

const scoredMap={};

scoreSnapshot.forEach(docSnap=>{

const s=docSnap.data();

scoredMap[s.participantId]=true;

});

scored=scoreSnapshot.size;

document.getElementById("scoredCount")
.innerText=scored;

document.getElementById("participantCount")
.innerText=participantSnapshot.size;

const container=

document.getElementById("participantsList");

container.innerHTML="";

if(participantSnapshot.empty){

container.innerHTML=`

<div class="empty">

No Participants Found

</div>

`;

return;

}

participantSnapshot.forEach(docSnap=>{

const p=docSnap.data();

const alreadyScored=
!!scoredMap[docSnap.id];

container.innerHTML+=`

<div class="card">

<div class="info">

<h3>

${p.participantNumber || "-"}

</h3>

<p>

${p.name}

</p>

<p>

${p.category || "-"}

</p>

</div>

<button

class="score-btn"

${alreadyScored ? "disabled" : ""}

onclick="openScoring('${docSnap.id}')">

${alreadyScored ? "Scored ✓" : "Score"}

</button>

</div>

`;

});

}

window.openScoring=function(participantId){

window.location.href=

`score.html?judge=${encodeURIComponent(judgeId)}&participant=${encodeURIComponent(participantId)}`;

};

loadJudge();

</script>

</body>

</html>
