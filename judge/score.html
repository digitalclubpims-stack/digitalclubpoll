<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Judge Scoring • Digital Club</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{

margin:0;
padding:0;
box-sizing:border-box;

}

body{

background:#020617;
color:#fff;
font-family:"Inter",sans-serif;

}

.container{

max-width:900px;
margin:auto;
padding:40px 20px;

}

.card{

background:#111827;
border-radius:20px;
padding:30px;

}

h1{

font-family:"Syne",sans-serif;
margin-bottom:10px;

}

.subtitle{

color:#94a3b8;
margin-bottom:25px;

}

.info{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:18px;

margin-bottom:30px;

}

.info-box{

background:#1f2937;
padding:18px;
border-radius:12px;

}

.info-box h4{

color:#94a3b8;
margin-bottom:8px;
font-size:.9rem;

}

.info-box p{

font-size:1.1rem;
font-weight:600;

}

.criteria{

margin-top:20px;

}

.criteria h3{

margin-bottom:20px;

}

label{

display:block;
margin-top:18px;
margin-bottom:8px;
font-weight:600;

}

input[type=number]{

width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;

}

.total{

margin-top:25px;
padding:18px;
background:#1f2937;
border-radius:12px;
font-size:22px;
font-weight:700;
text-align:center;

}

button{

width:100%;
margin-top:25px;
padding:15px;
background:#2563eb;
color:#fff;
border:none;
border-radius:10px;
font-size:16px;
font-weight:600;
cursor:pointer;

}

button:hover{

opacity:.9;

}

button:disabled{

background:#16a34a;
cursor:not-allowed;

}

.message{

margin-top:20px;
padding:15px;
border-radius:10px;
display:none;

}

.success{

background:#14532d;
color:#86efac;

}

.error{

background:#7f1d1d;
color:#fecaca;

}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1 id="participantName">

Loading...

</h1>

<p
id="participantCategory"
class="subtitle">

Loading...

</p>

<div class="info">

<div class="info-box">

<h4>

Judge

</h4>

<p id="judgeName">

Loading...

</p>

</div>

<div class="info-box">

<h4>

Participant Number

</h4>

<p id="participantNumber">

-

</p>

</div>

</div>

<div class="criteria">

<h3>

Scoring

</h3>

<label>

Creativity (0–40)

</label>

<input
type="number"
id="creativity"
min="0"
max="40"
value="0">

<label>

Uniqueness (0–30)

</label>

<input
type="number"
id="uniqueness"
min="0"
max="30"
value="0">

<label>

Presentation (0–30)

</label>

<input
type="number"
id="presentation"
min="0"
max="30"
value="0">

<div
class="total">

Total :
<span id="total">

0

</span>
/100

</div>

<button
id="submitBtn"
onclick="submitScore()">

Submit Score

</button>

<div
id="message"
class="message">

</div>

</div>

</div>

</div>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {

getFirestore,
doc,
getDoc,
collection,
query,
where,
getDocs,
addDoc,
serverTimestamp

}

from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig={

apiKey:"AIzaSyCsuOcZ86B55VnOXQA4Pa3O03n2XQn1_Rk",

authDomain:"pims-poll.firebaseapp.com",

databaseURL:"https://pims-poll-default-rtdb.firebaseio.com",

projectId:"pims-poll",

storageBucket:"pims-poll.firebasestorage.app",

messagingSenderId:"14637440444",

appId:"1:14637440444:web:3444173f31a6c43a809fb9",

measurementId:"G-FP42MFB2WR"

};

const app=initializeApp(firebaseConfig);

const db=getFirestore(app);

const judgeId=
sessionStorage.getItem("judgeId");

const participantId=
sessionStorage.getItem("participantId");

const eventId=
sessionStorage.getItem("eventId");

if(!judgeId || !participantId){

alert("Judge session expired.");

location.href="index.html";

}

let judgeDoc=null;

let participantDoc=null;

const msg=document.getElementById("message");

function showMessage(text,type="success"){

msg.style.display="block";

msg.className="message "+type;

msg.textContent=text;

}

function updateTotal(){

const c=Number(document.getElementById("creativity").value)||0;

const u=Number(document.getElementById("uniqueness").value)||0;

const p=Number(document.getElementById("presentation").value)||0;

document.getElementById("total").innerText=c+u+p;

}

["creativity","uniqueness","presentation"]

.forEach(id=>{

document.getElementById(id)

.addEventListener(

"input",

updateTotal

);

});

async function loadJudge(){

if(!judgeId){

showMessage("Judge ID Missing","error");

return;

}

const q=query(

collection(db,"judges"),

where("judgeId","==",judgeId)

);

const snap=await getDocs(q);

if(snap.empty){

showMessage("Invalid Judge","error");

return;

}

judgeDoc=snap.docs[0].data();

document.getElementById("judgeName").innerText=judgeDoc.name;

loadParticipant();

}

async function loadParticipant(){

const snap=

await getDoc(

doc(db,"participants",participantId)

);

if(!snap.exists()){

showMessage("Participant not found","error");

return;

}

participantDoc=snap.data();

document.getElementById("participantName").innerText=participantDoc.name;

document.getElementById("participantCategory").innerText=participantDoc.category||"-";

document.getElementById("participantNumber").innerText=participantDoc.participantNumber||"-";

const duplicate=

await getDocs(

query(

collection(db,"scores"),

where("judgeId","==",judgeId),

where("participantId","==",participantId)

)

);

if(!duplicate.empty){

document.getElementById("submitBtn").disabled=true;

document.getElementById("submitBtn").innerText="Already Scored";

showMessage("You have already scored this participant.");

}

}

window.submitScore=

async function(){

const creativity=Number(document.getElementById("creativity").value);

const uniqueness=Number(document.getElementById("uniqueness").value);

const presentation=Number(document.getElementById("presentation").value);

if(

creativity<0||creativity>40||

uniqueness<0||uniqueness>30||

presentation<0||presentation>30

){

showMessage("Invalid marks.","error");

return;

}

const total=

creativity+

uniqueness+

presentation;

try{

await addDoc(

collection(db,"scores"),

{

judgeId,

participantId,

eventId:judgeDoc.eventId,

judgeName:judgeDoc.name,

participantName:participantDoc.name,

creativity,

uniqueness,

presentation,

total,

createdAt:serverTimestamp()

}

);

showMessage("Score Submitted Successfully");

document.getElementById("submitBtn").disabled=true;

document.getElementById("submitBtn").innerText="Score Submitted";

setTimeout(()=>{

window.location.href="portal.html";
},1200);

}

catch(error){

console.error(error);

showMessage(error.message,"error");

}

};

updateTotal();

loadJudge();

</script>

</body>

</html>
